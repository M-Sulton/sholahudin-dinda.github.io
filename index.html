<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan: Sholahudin & Noventiya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #111; color: #f3f4f6; overflow: hidden; /* Sembunyikan scrollbar awal */ }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-script { font-family: 'Great Vibes', cursive; }
        
        /* Background Hero & Cover menggunakan foto1.jpg */
        .bg-foto1 {
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.5), rgba(17,17,17,1)), url('foto1.jpg');
            background-size: cover;
            background-position: center top;
        }

        /* Transisi Cover / Amplop */
        #cover-screen {
            transition: transform 1.2s cubic-bezier(0.77, 0, 0.175, 1), opacity 1s ease-in-out;
        }
        .cover-open {
            transform: translateY(-100%);
            opacity: 0;
        }

        /* Floating Music Button */
        #music-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 50;
            animation: spin 4s linear infinite;
            display: none; /* Disembunyikan sampai undangan dibuka */
        }
        .paused { animation-play-state: paused !important; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased">
